<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#274b8f"/>
      <stop offset="55%" stop-color="#5a86c4"/>
      <stop offset="100%" stop-color="#bcd6ee"/>
    </linearGradient>
    <linearGradient id="facade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfdfd"/>
      <stop offset="100%" stop-color="#e7e7ea"/>
    </linearGradient>
    <linearGradient id="glass2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe6ff"/>
      <stop offset="100%" stop-color="#9fc4ec"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>
  <circle cx="660" cy="90" r="46" fill="#fff7d8" opacity="0.9"/>
  <ellipse cx="150" cy="120" rx="90" ry="26" fill="#ffffff" opacity="0.55"/>
  <ellipse cx="220" cy="140" rx="60" ry="20" fill="#ffffff" opacity="0.5"/>

  <!-- ground / street -->
  <rect x="0" y="500" width="800" height="100" fill="#6b6b73"/>
  <rect x="0" y="494" width="800" height="8" fill="#ffffff" opacity="0.5"/>
  <rect x="0" y="480" width="800" height="20" fill="#d9d6cf"/>

  <!-- side buildings for street context -->
  <rect x="0" y="260" width="150" height="240" fill="#d8cdb8"/>
  <rect x="650" y="300" width="150" height="200" fill="#cdd6cf"/>

  <!-- main building -->
  <rect x="170" y="140" width="460" height="360" fill="url(#facade)" stroke="#cfcfd4" stroke-width="2"/>

  <!-- roof / cornice -->
  <rect x="160" y="128" width="480" height="18" fill="#d6121f"/>

  <!-- sign with logo -->
  <g transform="translate(400,90)">
    <rect x="-170" y="-30" width="340" height="62" rx="10" fill="#ffffff" stroke="#d6121f" stroke-width="4"/>
    <circle cx="-130" cy="0" r="24" fill="#ffffff" stroke="#e8112d" stroke-width="3"/>
    <text x="-130" y="-3" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="10" fill="#e8112d">Stratford</text>
    <text x="-130" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#e8112d">I.C.L.I</text>
    <text x="20" y="-2" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="#1a1f3c" letter-spacing="1">STRATFORD</text>
    <text x="20" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="12" fill="#e8112d" letter-spacing="3">I.C.L.I.</text>
  </g>

  <!-- windows grid -->
  <g fill="url(#glass2)" stroke="#b9c6d8" stroke-width="2">
    <rect x="200" y="190" width="60" height="70" rx="3"/>
    <rect x="280" y="190" width="60" height="70" rx="3"/>
    <rect x="460" y="190" width="60" height="70" rx="3"/>
    <rect x="540" y="190" width="60" height="70" rx="3"/>

    <rect x="200" y="290" width="60" height="70" rx="3"/>
    <rect x="280" y="290" width="60" height="70" rx="3"/>
    <rect x="460" y="290" width="60" height="70" rx="3"/>
    <rect x="540" y="290" width="60" height="70" rx="3"/>

    <rect x="200" y="390" width="60" height="70" rx="3"/>
    <rect x="540" y="390" width="60" height="70" rx="3"/>
  </g>
  <g stroke="#8fa6c2" stroke-width="1.5" opacity="0.6">
    <line x1="230" y1="190" x2="230" y2="260"/>
    <line x1="310" y1="190" x2="310" y2="260"/>
    <line x1="490" y1="190" x2="490" y2="260"/>
    <line x1="570" y1="190" x2="570" y2="260"/>
  </g>

  <!-- entrance -->
  <rect x="350" y="370" width="100" height="130" fill="#1a1f3c" rx="4"/>
  <rect x="362" y="382" width="34" height="118" fill="#3a4576" opacity="0.7"/>
  <rect x="404" y="382" width="34" height="118" fill="#3a4576" opacity="0.7"/>
  <rect x="335" y="364" width="130" height="10" fill="#d6121f"/>

  <!-- awning -->
  <path d="M330 364 L470 364 L460 340 L340 340 Z" fill="#e8112d"/>
  <path d="M330 364 L470 364 L470 370 L330 370 Z" fill="#b8101f"/>

  <!-- steps -->
  <rect x="345" y="498" width="110" height="8" fill="#9a9aa1"/>
  <rect x="355" y="490" width="90" height="8" fill="#b1b1b8"/>

  <!-- trees -->
  <g>
    <rect x="100" y="450" width="12" height="50" fill="#5a4632"/>
    <circle cx="106" cy="430" r="36" fill="#3a9a5b"/>
    <circle cx="80" cy="448" r="24" fill="#46aa68"/>
    <circle cx="132" cy="448" r="24" fill="#46aa68"/>
  </g>
  <g>
    <rect x="700" y="460" width="10" height="40" fill="#5a4632"/>
    <circle cx="705" cy="442" r="30" fill="#3a9a5b"/>
  </g>

  <!-- street lamp -->
  <rect x="650" y="420" width="6" height="80" fill="#3b3b3b"/>
  <circle cx="653" cy="416" r="10" fill="#fff3c9"/>
</svg>
