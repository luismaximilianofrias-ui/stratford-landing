<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" width="700" height="480">
  <defs>
    <linearGradient id="wallG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1eee9"/>
    </linearGradient>
    <linearGradient id="floorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7e1d6"/>
      <stop offset="100%" stop-color="#cfc6b4"/>
    </linearGradient>
    <linearGradient id="chairG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ee2b3d"/>
      <stop offset="100%" stop-color="#b8101f"/>
    </linearGradient>
  </defs>

  <!-- ceiling -->
  <rect width="700" height="60" fill="#e9e6df"/>
  <rect x="40" y="14" width="60" height="6" rx="2" fill="#cfcabb"/>
  <circle cx="120" cy="17" r="6" fill="#fff3c9"/>
  <circle cx="360" cy="17" r="6" fill="#fff3c9"/>
  <circle cx="600" cy="17" r="6" fill="#fff3c9"/>

  <!-- wall -->
  <rect x="0" y="60" width="700" height="270" fill="url(#wallG)"/>
  <!-- floor with tile lines -->
  <rect x="0" y="330" width="700" height="150" fill="url(#floorG)"/>
  <g stroke="#bdb29a" stroke-width="1.5" opacity="0.6">
    <line x1="0" y1="370" x2="700" y2="370"/>
    <line x1="0" y1="410" x2="700" y2="410"/>
    <line x1="0" y1="450" x2="700" y2="450"/>
    <line x1="100" y1="330" x2="40" y2="480"/>
    <line x1="240" y1="330" x2="200" y2="480"/>
    <line x1="380" y1="330" x2="360" y2="480"/>
    <line x1="520" y1="330" x2="520" y2="480"/>
    <line x1="640" y1="330" x2="660" y2="480"/>
  </g>

  <!-- AC unit -->
  <rect x="500" y="80" width="90" height="26" rx="4" fill="#ffffff" stroke="#d8d4c8" stroke-width="2"/>
  <rect x="505" y="90" width="80" height="4" fill="#d8d4c8"/>

  <!-- whiteboard -->
  <rect x="60" y="90" width="280" height="150" rx="4" fill="#ffffff" stroke="#cfcabb" stroke-width="4"/>
  <text x="80" y="130" font-family="Comic Sans MS, cursive" font-size="20" fill="#1a1f3c">Welcome to</text>
  <text x="80" y="160" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="26" fill="#e8112d">Stratford I.C.L.I.</text>
  <line x1="80" y1="178" x2="320" y2="178" stroke="#e0ddd3" stroke-width="2"/>
  <text x="80" y="205" font-family="Comic Sans MS, cursive" font-size="16" fill="#2d3561">Present Simple · Vocabulary</text>

  <!-- projector mount -->
  <rect x="420" y="64" width="60" height="18" rx="3" fill="#3a3a3a"/>
  <rect x="438" y="82" width="6" height="34" fill="#7a7a7a"/>
  <rect x="424" y="112" width="52" height="20" rx="4" fill="#2b2b2b"/>
  <circle cx="450" cy="122" r="5" fill="#9adfff"/>
  <path d="M450 132 L380 230 L520 230 Z" fill="#ffffff" opacity="0.07"/>

  <!-- door -->
  <rect x="610" y="100" width="70" height="200" fill="#f6f3ec" stroke="#cfcabb" stroke-width="3"/>
  <circle cx="668" cy="200" r="3" fill="#9a9282"/>

  <!-- desks with red chairs (3 rows) -->
  <g>
    <!-- row 1 -->
    <rect x="90" y="300" width="64" height="10" rx="3" fill="#dcd6c8"/>
    <rect x="115" y="310" width="10" height="34" fill="#b9b09a"/>
    <path d="M96 348 q4 -34 24 -34 q20 0 24 34 z" fill="url(#chairG)"/>
    <rect x="108" y="312" width="24" height="30" rx="3" fill="url(#chairG)"/>

    <rect x="220" y="296" width="64" height="10" rx="3" fill="#dcd6c8"/>
    <rect x="245" y="306" width="10" height="34" fill="#b9b09a"/>
    <path d="M226 344 q4 -34 24 -34 q20 0 24 34 z" fill="url(#chairG)"/>
    <rect x="238" y="308" width="24" height="30" rx="3" fill="url(#chairG)"/>

    <rect x="350" y="292" width="64" height="10" rx="3" fill="#dcd6c8"/>
    <rect x="375" y="302" width="10" height="34" fill="#b9b09a"/>
    <path d="M356 340 q4 -34 24 -34 q20 0 24 34 z" fill="url(#chairG)"/>
    <rect x="368" y="304" width="24" height="30" rx="3" fill="url(#chairG)"/>

    <!-- row 2 -->
    <rect x="155" y="380" width="64" height="10" rx="3" fill="#dcd6c8"/>
    <rect x="180" y="390" width="10" height="34" fill="#b9b09a"/>
    <path d="M161 428 q4 -34 24 -34 q20 0 24 34 z" fill="url(#chairG)"/>
    <rect x="173" y="392" width="24" height="30" rx="3" fill="url(#chairG)"/>

    <rect x="290" y="376" width="64" height="10" rx="3" fill="#dcd6c8"/>
    <rect x="315" y="386" width="10" height="34" fill="#b9b09a"/>
    <path d="M296 424 q4 -34 24 -34 q20 0 24 34 z" fill="url(#chairG)"/>
    <rect x="308" y="388" width="24" height="30" rx="3" fill="url(#chairG)"/>

    <rect x="430" y="372" width="64" height="10" rx="3" fill="#dcd6c8"/>
    <rect x="455" y="382" width="10" height="34" fill="#b9b09a"/>
    <path d="M436 420 q4 -34 24 -34 q20 0 24 34 z" fill="url(#chairG)"/>
    <rect x="448" y="384" width="24" height="30" rx="3" fill="url(#chairG)"/>
  </g>
</svg>
